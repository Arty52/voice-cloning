services:
  db:
    image: postgres:18.4
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-voice_cloning}
      POSTGRES_USER: ${POSTGRES_USER:-voice_cloning}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-voice_cloning}
      PGDATA: /var/lib/postgresql/18/docker
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        INSTALL_SAMPLE_PROCESSING: ${INSTALL_SAMPLE_PROCESSING:-0}
        INSTALL_DIARIZATION: ${INSTALL_DIARIZATION:-0}
    command: uvicorn voice_cloning.api:app --host 0.0.0.0 --port 6420 --reload
    env_file:
      - .env
    environment:
      APP_ROOT: /app
      CORS_ALLOWED_ORIGINS: http://localhost:4340,http://127.0.0.1:4340
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-voice_cloning}:${POSTGRES_PASSWORD:-voice_cloning}@db:5432/${POSTGRES_DB:-voice_cloning}
      DEFAULT_SAMPLE_PATH: /app/assets/voices/default/default-voice.mp3
      GENERATED_AUDIO_STORAGE_DIR: /app/storage/generated-audio
      STORAGE_DIR: /app/storage
      XDG_CACHE_HOME: /app/storage/model-cache
      VOICE_ASSETS_DIR: /app/assets/voices
      VOICE_MANIFEST_PATH: /app/assets/voices/voices.json
    ports:
      - "${API_PORT:-6420}:6420"
    volumes:
      - ./backend/src:/app/backend/src
      - ./assets/voices:/app/assets/voices
      - ./scripts:/app/scripts:ro
      - ./storage:/app/storage
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    command: npm run dev
    environment:
      VITE_API_PROXY_TARGET: http://api:6420
    ports:
      - "${WEB_PORT:-4340}:4340"
    volumes:
      - ./frontend:/app/frontend
      - frontend-node-modules:/app/frontend/node_modules
    depends_on:
      - api

volumes:
  frontend-node-modules:
  postgres-data:
